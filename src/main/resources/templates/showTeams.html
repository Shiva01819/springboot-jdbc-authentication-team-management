<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head> 
    <title>Teams database</title> 
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<!-- Absolute path. It always starts from the root. -->
	<link rel="stylesheet" href="/bootstrap.min.css" media="screen"/>
</head>
<body>

<div align="right">
<a href="/logout" >Logout ?</a>
</div>
	<div class="container">
      <div class="page-header" id="banner">
        <div class="row">
          <div class="col-lg-8 col-md-7 col-sm-6">
            <h1>Teams</h1>

			<table class="table table-striped table-hover">
				<thead>
					<tr>
						<th>Team ID</th>
						<th>Name of the Team</th>
						<th>City</th>
						<th></th>
					</tr>
				</thead>
				<tbody>
					<!-- th:each is the for loop in Thymeleaf. For every
					team's record in the database table, it creates a row in this table.
					We are defining Model-View or View-Model bindings
					 -->
					<tr th:each="team : ${teams}">
				    	<td th:text="${team.teamId}"></td>
				    	<td th:text="${team.teamName}"></td>
				    	<td th:text="${team.homeCity}"></td>
				    </tr>
				</tbody>
			</table>
			<a href="/IPL2022/list" class="btn">Refresh</a>&nbsp;&nbsp;
			<a href="/IPL2022/" class="btn">Home</a><br/>
		
          </div>
        </div>
      </div>
    </div>
    <br><br>
</body>
</html>
